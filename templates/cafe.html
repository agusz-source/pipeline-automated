<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{nombre} - Café en Rosario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; }
        .hero { background: linear-gradient(135deg, #3e2723 0%, #6d4c41 100%); color: white; text-align: center; padding: 4rem 2rem; min-height: 60vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        .rating { margin: 1.5rem 0; }
        .stars { color: #ffd700; font-size: 1.8rem; letter-spacing: 4px; }
        .whatsapp-btn { background: #25d366; color: white; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 1rem; }
        .services { padding: 4rem 2rem; background: #f5f5f5; text-align: center; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; max-width: 1200px; margin: 2rem auto; }
        .service-card { background: white; padding: 2rem; border-radius: 15px; }
        footer { background: #3e2723; color: white; text-align: center; padding: 2rem; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <section class="hero">
        <div class="container">
            <h1>{nombre}</h1>
            <p>Café de especialidad - Rosario</p>
            <div class="rating"><span class="stars">★★★★★</span> <span>{puntaje}⭐ · {resenas} reseñas</span></div>
            <a href="https://wa.me/{telefono}" class="whatsapp-btn">📱 Contacto</a>
        </div>
    </section>
    <section class="services">
        <h2>Nuestros Servicios</h2>
        <div class="services-grid">
            <div class="service-card"><h3>Café de Especialidad</h3></div>
            <div class="service-card"><h3>Pastelería Artesanal</h3></div>
            <div class="service-card"><h3>Brunch</h3></div>
            <div class="service-card"><h3>Take Away</h3></div>
        </div>
    </section>
    <footer><p>{nombre} - {direccion}</p><p>© {year}</p></footer>
</body>
</html>
